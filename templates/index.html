<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocChat</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Google Fonts – Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────────────────────── -->
  <nav class="app-navbar" id="app-navbar">
    <div class="navbar-inner">
      <div class="navbar-brand-group">
        <i class="fa-solid fa-file-lines brand-icon"></i>
        <div class="brand-text">
          <span class="brand-name">DocChat</span>
          <span class="brand-sub">Document Q&amp;A</span>
        </div>
      </div>

      <div class="navbar-right">
        <span id="doc-indicator" class="doc-indicator">
          <i class="fa-regular fa-circle-dot status-dot"></i>
          <span id="doc-indicator-text">Loading…</span>
        </span>
        <button id="reset-btn" class="btn-change hidden" title="Clear conversation history">
          <i class="fa-solid fa-arrows-rotate me-1"></i>New Chat
        </button>
      </div>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ────────────────────────────────────────────────── -->
  <div id="app">

    <!-- NO DOCUMENT BANNER (shown when no active document) -->
    <section id="no-doc-section" class="hidden">
      <div class="upload-card" style="text-align:center;padding:3rem 2rem;">
        <i class="fa-solid fa-file-circle-xmark" style="font-size:3rem;color:var(--text-muted);margin-bottom:1rem;"></i>
        <p style="font-size:1.1rem;color:var(--text-muted);">No document is currently available.</p>
        <p style="color:var(--text-muted);">Please contact the administrator to load a document.</p>
      </div>
    </section>

    <!-- CHAT SECTION -->
    <section id="chat-section" class="hidden">

      <div id="chat-window">
        <div class="welcome-msg">
          <i class="fa-regular fa-comment-dots welcome-icon"></i>
          <p>Document loaded. Ask me anything about it.</p>
        </div>
      </div>

      <div id="input-area">
        <textarea
          id="question-input"
          placeholder="Ask a question about the document… (Enter to send, Shift+Enter for new line)"
          rows="2"
        ></textarea>
        <button id="send-btn" class="btn-send">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>

    </section>

  </div><!-- /#app -->

  <!-- ── NAME / EMAIL MODAL ──────────────────────────────────────────────── -->
  <div id="user-modal" class="um-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="um-title">
    <div class="um-card">

      <!-- Branded header strip -->
      <div class="um-accent-bar">
        <i class="fa-solid fa-file-lines"></i>
        <span>DocChat</span>
      </div>

      <!-- Form body -->
      <div class="um-body">
        <h2 class="um-title" id="um-title">Start a new chat</h2>
        <p class="um-subtitle">Please enter your details to continue.</p>

        <form id="user-form" novalidate>
          <div class="um-field">
            <label for="user-name">Name</label>
            <div class="um-input-wrap">
              <i class="fa-regular fa-user um-input-icon"></i>
              <input type="text" id="user-name" placeholder="Your full name" autocomplete="name" required>
            </div>
          </div>
          <div class="um-field">
            <label for="user-email">Email</label>
            <div class="um-input-wrap">
              <i class="fa-regular fa-envelope um-input-icon"></i>
              <input type="email" id="user-email" placeholder="you@example.com" autocomplete="email" required>
            </div>
          </div>
          <p id="modal-error" class="um-error hidden"></p>
          <button type="submit" id="modal-submit-btn" class="um-submit">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>Start Chat
          </button>
        </form>
      </div>

    </div>
  </div>

  <!-- Markdown parser + sanitizer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/main.js?v=5"></script>
</body>
</html>
